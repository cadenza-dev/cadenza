# ------------------------------------------------------------------
# Role → ownership boundaries. Canonical definitions live in
# AGENTS.md §3; this block mirrors them for quick lookup.
# ------------------------------------------------------------------
ownership:
  scout:
    writes: [ROADMAP.md, docs/research/]
    must_not_touch: [spec/, packages/, docs/adr/]
  architect:
    writes: [spec/, docs/adr/, docs/design/, prompt/]
    must_not_touch: [packages/**/src/]
  builder:
    writes: [packages/, tests, trace/, infra configs]
    must_not_touch: [spec/ (when CONTRACT_FROZEN), docs/adr/ (when Accepted)]
  reviewer:
    writes: [trace/<phase>/review*.md (with maintainer approval)]
    must_not_touch: [packages/, spec/, docs/adr/, prompt/, scripts/]
  wizard:
    writes: [prompt/, trace/<phase>/, memory/ (with maintainer approval)]
    must_not_touch: [packages/, spec/ (when CONTRACT_FROZEN), STATUS.yaml.current_phase]

# ------------------------------------------------------------------
# Where to find things (agents cross-reference during context recovery)
# ------------------------------------------------------------------
index:
  agents_guide: AGENTS.md
  analysis_en: docs/analysis/analysis-final.md
  analysis_zh: docs/analysis/analysis-final.zh.md
  adr_index: docs/adr/README.md
  design: docs/design/
  spec_format: spec/README.md
  trace_format: trace/README.md
  memory: memory/
  kick_files: prompt/
  workflow: docs/agentic-workflow.md

