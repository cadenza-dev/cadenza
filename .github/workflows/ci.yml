name: CI

on:
  pull_request:
  push:
  repository_dispatch:
    types: [manual-ci]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-24.04
    outputs:
      browser: ${{ steps.classify.outputs.browser }}
      format: ${{ steps.classify.outputs.format }}
      full: ${{ steps.classify.outputs.full }}
      governance: ${{ steps.classify.outputs.governance }}
      markdown: ${{ steps.classify.outputs.markdown }}
      shell: ${{ steps.classify.outputs.shell }}
      ts: ${{ steps.classify.outputs.ts }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Classify changed files
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -n "${BASE_SHA:-}" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            node --experimental-strip-types scripts/classify-ci-changes.ts --base "$BASE_SHA" >> "$GITHUB_OUTPUT"
          else
            node --experimental-strip-types scripts/classify-ci-changes.ts --all >> "$GITHUB_OUTPUT"
          fi

  markdown:
    name: Markdown lint
    needs: changes
    if: needs.changes.outputs.full == 'true' || needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Markdown lint
        run: pnpm exec markdownlint-cli2 "**/*.md"

  shell:
    name: Shell format check
    needs: changes
    if: needs.changes.outputs.full == 'true' || needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go for shfmt
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install shfmt
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.8.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Shell format check
        run: find scripts .agents .githooks .codex -name '*.sh' -print0 | xargs -0 shfmt -d

  governance:
    name: Governance checks (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.full == 'true' || needs.changes.outputs.governance == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025
          - macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frozen contract overrides
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -n "${BASE_SHA:-}" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            pnpm -s check:frozen -- --base "$BASE_SHA"
          else
            pnpm -s check:frozen
          fi

      - name: Spec lint
        run: pnpm spec:lint

      - name: Phase check
        run: pnpm phase:check

      - name: Harness check
        run: pnpm check:harness

      - name: Memory check
        run: pnpm check:memory

  format:
    name: Biome lint and format (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.full == 'true' || needs.changes.outputs.format == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025
          - macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

  ts:
    name: TypeScript checks (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.full == 'true' || needs.changes.outputs.ts == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025
          - macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  browser:
    name: Browser preview (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.full == 'true' || needs.changes.outputs.browser == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025
          - macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium headless shell with system dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 10
        env:
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: 120000
        run: pnpm exec playwright install --with-deps --only-shell chromium

      - name: Install Playwright Chromium headless shell
        if: runner.os != 'Linux'
        timeout-minutes: 10
        env:
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: 120000
        run: pnpm exec playwright install --only-shell chromium

      - name: Browser preview tests
        run: pnpm test:browser

  whitespace:
    name: Whitespace check
    needs: changes
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Whitespace check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -n "${BASE_SHA:-}" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git diff --check "$BASE_SHA"...HEAD
          else
            git diff --check
          fi

  ci-summary:
    name: CI summary
    needs:
      - changes
      - markdown
      - shell
      - governance
      - format
      - ts
      - browser
      - whitespace
    if: always()
    runs-on: ubuntu-24.04

    steps:
      - name: Summarize job results
        run: |
          failed=0

          check_result() {
            name="$1"
            result="$2"
            echo "$name: $result"
            case "$result" in
              success|skipped)
                ;;
              *)
                failed=1
                ;;
            esac
          }

          check_result changes "${{ needs.changes.result }}"
          check_result markdown "${{ needs.markdown.result }}"
          check_result shell "${{ needs.shell.result }}"
          check_result governance "${{ needs.governance.result }}"
          check_result format "${{ needs.format.result }}"
          check_result ts "${{ needs.ts.result }}"
          check_result browser "${{ needs.browser.result }}"
          check_result whitespace "${{ needs.whitespace.result }}"

          exit "$failed"
