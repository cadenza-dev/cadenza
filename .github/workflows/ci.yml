name: CI

on:
  pull_request:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025
          - macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Go for shfmt
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install shfmt
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.8.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frozen contract overrides
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -n "${BASE_SHA:-}" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            pnpm -s check:frozen -- --base "$BASE_SHA"
          else
            pnpm -s check:frozen
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Install Playwright Chromium with system dependencies
        if: runner.os == 'Linux'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright Chromium
        if: runner.os != 'Linux'
        run: pnpm exec playwright install chromium

      - name: Browser preview tests
        run: pnpm test:browser

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Markdown lint
        run: pnpm exec markdownlint-cli2 "**/*.md"

      - name: Shell format check
        run: pnpm lint:shell

      - name: Spec lint
        run: pnpm spec:lint

      - name: Phase check
        run: pnpm phase:check

      - name: Harness check
        run: pnpm check:harness

      - name: Memory check
        run: pnpm check:memory

      - name: Whitespace check
        run: git diff --check
