name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shfmt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frozen contract overrides
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -n "${BASE_SHA:-}" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            pnpm -s check:frozen -- --base "$BASE_SHA"
          else
            pnpm -s check:frozen
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Markdown lint
        run: pnpm exec markdownlint-cli2 "**/*.md"

      - name: Shell format check
        run: find scripts .agents -name '*.sh' -print0 | xargs -0 shfmt -d

      - name: Spec lint
        run: pnpm spec:lint

      - name: Phase check
        run: pnpm phase:check

      - name: Whitespace check
        run: git diff --check
